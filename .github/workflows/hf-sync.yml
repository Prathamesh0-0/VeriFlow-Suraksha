name: Sync Backend to Hugging Face Space

on:
  push:
    branches: [main, master]
    # Only trigger if changes are made to the backend folder
    paths:
      - 'backend/**'

jobs:
  sync-to-hub:
    name: Sync to Hugging Face
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      
      - name: Push to Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Configure Git
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          
          # Instead of subtree split (which pushes history), we create a fresh repo
          # to ensure old deleted binary files in history aren't pushed to HF.
          cd backend
          git init
          git checkout -b main
          git add .
          git commit -m "Sync backend to Hugging Face Space"
          git push https://user:$HF_TOKEN@huggingface.co/spaces/Shameless0-0/veriflow-backend main --force

          
